<!doctype html>
<html>

<head>
  <title>Match3Stickman</title>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta id="gameViewport" name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="styles.css" rel="stylesheet" type="text/css">

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #20242b;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Desktop/tablet: display the portrait game like a phone screen. */
    #phone-frame {
      position: relative;
      width: min(calc(100vw - 24px), calc((100vh - 24px) * 9 / 16), 430px);
      aspect-ratio: 9 / 16;
      max-height: calc(100vh - 24px);
      overflow: hidden;
      background: #000;
      border-radius: 22px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.38);
    }

    #embed-html {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* Make the GWT/LibGDX canvas fit inside the portrait wrapper. */
    #embed-html canvas,
    #embed-html iframe {
      display: block;
      width: 100% !important;
      height: 100% !important;
      max-width: 100%;
      max-height: 100%;
    }

    /* On small portrait phones, use the available screen naturally. */
    @media (max-width: 480px) and (orientation: portrait) {
      #phone-frame {
        width: 100vw;
        height: 100vh;
        max-height: none;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
</head>

<body>
  <div id="phone-frame">
    <div id="embed-html"></div>
  </div>

  <script type="text/javascript" src="html/html.nocache.js"></script>
  <script>
    function handleMouseDown(evt) {
      evt.preventDefault();
      evt.stopPropagation();
      window.focus();
    }

    function handleMouseUp(evt) {
      evt.preventDefault();
      evt.stopPropagation();
    }

    document.addEventListener('contextmenu', function (event) {
      event.preventDefault();
    });

    var gameRoot = document.getElementById('embed-html');
    gameRoot.addEventListener('mousedown', handleMouseDown, false);
    gameRoot.addEventListener('mouseup', handleMouseUp, false);
  </script>
</body>

</html>
